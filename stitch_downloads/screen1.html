            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;

            transform: translateY(16px);
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

<span class="font-label-mono text-label-mono text-on-surface-variant">Terminal v1.0</span>
</div>

<a class="flex items-center px-4 h-full gap-2 text-primary dark:text-primary border-b-2 border-primary bg-surface-container-low dark:bg-surface-container-low opacity-80 transition-all duration-150" href="#">
<span class="material-symbols-outlined text-[18px]">search</span>
<span class="font-label-mono text-label-mono">Search</span>
</a>
<a class="flex items-center px-4 h-full gap-2 text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors duration-150" href="#">

</a>
<a class="flex items-center px-4 h-full gap-2 text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors duration-150" href="#">

</a>

<span class="material-symbols-outlined text-[18px]">folder_shared</span>
<span class="font-label-mono text-label-mono">Repository</span>
</a>
</nav>
<div class="flex gap-4 items-center h-full">
<button class="hidden md:flex px-4 py-1.5 bg-primary-container text-on-surface font-label-mono text-label-mono border border-outline-variant hover:border-on-surface transition-colors duration-150 rounded items-center gap-2">
<span class="material-symbols-outlined text-[16px]">add</span>
            New Scan

<div class="w-px h-6 bg-outline-variant hidden md:block mx-2"></div>
<button class="text-on-surface-variant hover:text-primary transition-colors duration-150">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors duration-150">
<span class="material-symbols-outlined">help_outline</span>
</button>

<div class="w-full max-w-3xl flex flex-col gap-stack-lg z-10">
<div class="text-center fade-in-up">
<h2 class="font-display text-display text-on-surface mb-stack-md">Find businesses before everyone else.</h2>
<p class="font-label-mono text-label-mono text-on-surface-variant tracking-widest uppercase">System Ready // Awaiting Input</p>
</div>
<div class="bg-primary-container border border-outline-variant p-stack-lg flex flex-col gap-stack-md fade-in-up delay-100">

</div>
<div class="flex-1 flex flex-col gap-unit">

</div>

</div>
</div>

</button>

                    </span>
